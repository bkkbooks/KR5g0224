front:
  text: 二經同卷群一
  hash: sha256:9db0f68ba87a20e14a7adf4433c5ae98de897c268c0518bb3df971443b7e5d35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0224_HFL_000-001a, image: hfl/1055/1055-004.png}
body:
  text: 北帝說豁落七元經七元真訣語驅疫祕經北帝說豁落七元經是時元真登紫金堂鳳樓閣說三元品目拔度群生令知報應是時三清凝氣日月朗明三光振肅靈禽鼓吹天真並會時有北方九天大真人乘星步斗單錦雲衣一時詣座願為衆生說延生保命之法演乎中國祛魔滅精消災度難拔濟困篤普得安靜願帝普宣告及天下邪魔令知罪源盡生善念不害於衆生日有所益天尊告曰三界之上北帝大魔王下治在北海天地北方羅酆絶頂之山山高二千六百里周旋三萬里內外皆七寶堂室生七寶宫亦盛都也皆主知萬民生死之籍天下鬼神莫不由也北帝言我之極位統三十二夭之總司綰諸天之簿籍天帝皆來稽首天下萬神皆來朝謁萬鬼千神悉皆震伏令以此六天宫名號相示為六天大魔王宫主知萬鬼之師執生人魂魄閉縶重檻為陰神所縶名係鬼官延纍生人子孫作諸考訟病衰連年禍厄侵害若知吾六宫名者可以晨夕誦之惡鬼不敢近妖邪伏滅禍害不能侵魂精澄正神氣常安萬靈震怖矣北帝告七真曰我師昔學道修齊立功救人隨機濟物功德圓備勤苦香燈彌劫歷年行乎道化拯拔群生令知報應得離魔域俱入正真之道修佩靈文祈醮真官回籌益算解厄延年除災却障消諸不祥然燈行道誦念真文神咒或一七二七日申奏章表醫治之師專心絶念存思在法我當遣八部禁兵與五方天帝兵馬二十八宿兵馬五湖七澤兵馬億億萬騎排三甲之仗乘三殺之氣下降道場隨所擁護掃除妖魅斷截邪精救濟生人得出鬼患師獲冲天之機慎勿輕犯考致七世名係鬼官為輕法之罪慢師不朝得致靈官各還本職為慢師之罪不遵道科之愆矣七真曰欲修此法當於家建立一精舍方圓一丈開四門當寫本帝真形圖於靜室之中立燈九燈盞亦七盞常燃令光明日即息之夜燭室中立一香沙壇二大四寸中立香爐一口靜水五碗劔一口勿令穢觸淨室之前建七元壇廣一丈二尺高三尺三層醮祭常令七天大魔王衛護非同志勿窺靈壇矣七真曰天地疑精之氣化之七氣列位七宿九氣為九曜五氣作五星三氣成三元八氣立八靈降真之氣布列真王之氣以備於星辰群生之類莫不由也皆主知生死之籍後學道士專精一法救拔凡迷得出魔俗咸發善心可列符籙隨病所治事有大小攝伏魔精保安魂爽帶佩絹素出入常隨身萬靈傳迎所在捧送列七元之王氣乘九元之精素佩者行來天下大師入其病家萬鬼自怖邪精消亡潜蹤匿跡威震無邊福濟生靈超拔玄祖先魂也七真曰若有人能於來世中值遇此法可移動星斗乘三五之氣可以挑星撥斗飛步七元登綱駕紀攝伏惡魔助國扶難覆護生民可為消災散禍滅諸怪惡依法行用勿犯冥科當以法信履民之物一一散施貧窮憐愍困厄方便救拔當依玄科冥助道力陰兵共治無不差矣七真曰夫末學道士欲為人治病制伏妖魅行我妙法者科令嚴峻難可奉焉但依七元列位然燈行道拜奏朱表上達天真當先詣天地水三官為主生死要司之籍又請三宫九府百二十曹知籍君解形却禍先為解先亡拷對又解病人冤對後乃治之先然燈七盞用左麻朱繩連星綱用酒七盞白脯七片香五爐淨水五碗又外一座五土真宫於偏處當令侍衛勿為邪穢所觸又燈中施符一道依次朱書致油中降天真矣七真曰大道慈愍恩惠生民故設延生之法開度未遇淺學者令知罪福若國府有難兵戈鬥亂天下不安但於國福德之方宫苑之內鎮立北斗七元壇場燃燈行道申奏章表鎮壓其國轉經念咒存思吐納三時行道轉念真詮當請鎮國天龍五帝兵馬三洞天官千乘萬騎羅列國界殄滅强兵自然歸伏八方寧靜國受太平君臣用道隆德相扶當建北帝神咒大齊三日兩宵五時行道拜奏章表上謝天威下益五土將以和天靖地保國寧家安鎮社稷一切真靈皆獲道福也七真曰下元生民若有疾病彌月於牀遍身痛苦魂被水官所考地官奏罪於天官病加困篤莫能救療但請三洞真師來降宅內建立道場七日七夜一日三時行道轉念神咒驅除災疫我當遣飛天猛獸威神擁護生民三官除罪徑上玄都黑簿除籍書生名於左宫得恩之後醮謝三官七真曰下元生民為强精鬼魅所惱病患連年不差者當請三洞道師建立靜室燃燈七盞七日當下五星神符鎮五方朱書桃板廣三寸長一尺七寸青竹一丈七尺纂之即燃燈行道誦咒行諸符籙鎮壓佩帶當請五嶽真神四瀆靈將長加守護鬼魅永除生民得差得恩之後醮謝五嶽四瀆靈官七真曰下元生民新建精舍士氣侵害官災拘縶禍害併生可請三洞真師來入宅中掃蕩一室北斗七元之位然燈行道拜上解六害章表朱書黃絹奏五帝并謝五星當得司命除籍地官恕愆疾病消除官𥝠殄滅得恩之後醮謝五帝之神十二月將七宿真官當書七寶神符以梓木板長二尺四寸懸宅四維以斗口圍宅隨建所施科令嚴峻為封宅之法冥禁不輊未學道士愼勿犯此玄科禍沒九祖長役鬼官之中矣七真曰吾居七元官位之北極皆有華蓋相隨帝居於中其星皆生七寶光燁燦爛號為太微北極帝君常月初三二十七日降下人間受人之醮祭察人之善惡修學功過年命長短此夜可於中庭立機筵置列錢馬九分精膳妙供酒脯并香獻上求乞度脫災厄延命益算可求法術救濟萬民求願治邪考鬼滅精之法當此夜欲卧時先存華蓋九星在頭左北斗右北斗上北斗下北斗三台覆其中於卧室東面存二十八宿真官如嬰兒之狀著錦裙紫紗帔執青簡口吐王氣入我口中皆為真氣匝滿身中得此之道後乃為降靈之師可為世之明師萬鬼自怖行來出入伏御山靈惡獸山精野魅悉皆殄滅真經寶祕四萬劫方傳一人若有真人傳法可用白素四十尺金錢質信米麵香油祭醮之具可傳一人如不得至人可書一本投名山大澤之中題云函諱可得延齡地官所舉名上金簡刻字留音萬神侍衛立見真道矣七真曰夫𣣄修學此道精勤苦節至在一法不吝世財陰施道德依科醮祭求萬事皆應非但鬼神之患愼勿輕泄行尸之人禍沒九玄冥禁不輕符非不周細矣七真曰夫𣣄治病救人考鬼之法先存本師次存三元大將軍領兵九億萬騎三師兵衆有八萬人次存北方大帝領兵五億萬衆皆黑衣降入道場訖次存七元真官皆戴七寶之冠著錦華之衣執七寶神符來降道場即上燈著符於燈盞中又書符兩道籖安道門兩邊明日召靈降真皆是驅馳星斗周旋勿外此元精真氣結之自然皆致太玄北門鳳閣之上名曰陰生廣靈之符七元降真名長生符神出乎玄宫北海崖極玄天洞陰朔單之國五龍之臺南軒不傳下仙得之者皆為五嶽真人尅遊三界白日登晨第一元精真人素語紫童小有天王為之玉訣靈音三千年一遇此七道符書了啓請七真降位後便下符閉氣從一至七不得雜類穢觸人見之矣此符作道場書置盆中召靈降神辟除萬穢北帝說豁落七元經
